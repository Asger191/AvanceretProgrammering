<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Dijkstra Visualisering</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f3;
            color: #1a1a1a;
            padding: 1.5rem;
        }

        #hw {
            max-width: 720px;
            margin: 0 auto;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 1rem;
        }

        #controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        button {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.4;
        }

        #cv {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #efefed;
        }

        #queue {
            font-size: 12px;
            margin-top: 8px;
            color: #444;
        }

        #log {
            font-size: 12px;
            margin-top: 10px;
            max-height: 120px;
            overflow-y: auto;
            border-top: 1px solid #ddd;
            padding-top: 6px;
        }

        .le {
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>
<div id="hw">
    <h1>Dijkstra visualisering</h1>

    <div id="controls">
        <button id="btn-go">Start</button>
        <button id="btn-step" disabled>Næste trin</button>
        <button id="btn-reset">Reset</button>
    </div>

    <canvas id="cv"></canvas>

    <div id="queue"></div>
    <div id="log"></div>
</div>

<script>
    // ─── DATA ─────────────────────────────────

    const SRC = 0;
    const DST = 12;
    const labels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    const houses = [
        {id:0,x:.04,y:.5},{id:1,x:.18,y:.2},{id:2,x:.18,y:.5},{id:3,x:.18,y:.8},
        {id:4,x:.36,y:.12},{id:5,x:.36,y:.38},{id:6,x:.36,y:.65},{id:7,x:.36,y:.88},
        {id:8,x:.60,y:.25},{id:9,x:.60,y:.55},{id:10,x:.60,y:.8},
        {id:11,x:.78,y:.38},{id:12,x:.96,y:.5}
    ];

    const edges = [
        [0,1,4],[0,2,2],[0,3,7],
        [1,4,3],[1,5,6],
        [2,5,4],[2,6,5],
        [3,6,3],[3,7,6],
        [4,8,5],[4,5,2],
        [5,8,4],[5,9,7],
        [6,9,3],[6,10,5],
        [7,10,4],
        [8,11,3],[8,9,6],
        [9,11,5],[9,10,4],
        [10,12,8],[11,12,4],
    ];

    const adj = Array.from({length:houses.length},()=>[]);
    edges.forEach(([u,v,w])=>adj[u].push({v,w}));

    // ─── CANVAS ───────────────────────────────

    const cv = document.getElementById("cv");
    const ctx = cv.getContext("2d");
    const logEl = document.getElementById("log");
    const queueEl = document.getElementById("queue");

    function W(){return cv.clientWidth||720;}
    function H(){return 460;}
    function px(h){return [h.x*W(),h.y*H()];}

    // ─── STATE ────────────────────────────────

    let nodeState=[],distArr=[],prevArr=[];
    let pathEdges=new Set();
    let gen=null;
    let pqVisual=[];

    // ─── DRAW ─────────────────────────────────

    function draw(){
        cv.width=W(); cv.height=H();
        ctx.clearRect(0,0,W(),H());

        // EDGES
        edges.forEach(([u,v,w])=>{
            const [x1,y1]=px(houses[u]);
            const [x2,y2]=px(houses[v]);

            const key = `${u}-${v}`;
            const isPath = pathEdges.has(key);

            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.strokeStyle = isPath ? "red" : "#bbb";
            ctx.lineWidth = isPath ? 3 : 1;
            ctx.stroke();

            ctx.fillStyle="#555";
            ctx.font="10px system-ui";
            ctx.fillText(w,(x1+x2)/2,(y1+y2)/2);
        });

        // NODES
        houses.forEach((h,i)=>{
            const [x,y]=px(h);

            let color="#ccc";
            if(i===SRC) color="green";
            else if(i===DST) color="red";
            else if(nodeState[i]==="current") color="purple";
            else if(nodeState[i]==="queued") color="orange";
            else if(nodeState[i]==="visited") color="green";

            ctx.beginPath();
            ctx.arc(x,y,12,0,2*Math.PI);
            ctx.fillStyle=color;
            ctx.fill();

            // afstand
            ctx.fillStyle="#000";
            ctx.font="10px system-ui";
            ctx.textAlign="center";
            ctx.fillText(distArr[i]===Infinity?"?":distArr[i],x,y-16);

            // bogstav
            ctx.fillStyle="#fff";
            ctx.font="bold 11px system-ui";
            ctx.textBaseline="middle";
            ctx.fillText(labels[i],x,y);
        });
    }

    // ─── LOG ──────────────────────────────────

    function log(msg){
        const el=document.createElement("div");
        el.className="le";
        el.textContent=msg;
        logEl.prepend(el);
    }

    function updateQueue(){
        queueEl.textContent="Kø: "+
            pqVisual.map(([d,n])=>`(${labels[n]}:${d})`).join(", ");
    }

    // ─── DIJKSTRA ─────────────────────────────

    function* dijkstra(s,t){
        distArr=Array(houses.length).fill(Infinity);
        nodeState=Array(houses.length).fill("unvisited");
        prevArr=Array(houses.length).fill(-1);
        pathEdges.clear();

        distArr[s]=0;
        pqVisual=[[0,s]];
        nodeState[s]="queued";

        while(pqVisual.length){
            pqVisual.sort((a,b)=>a[0]-b[0]);
            updateQueue();

            const [d,u]=pqVisual.shift();
            nodeState[u]="current";

            log("Behandler node "+labels[u]);
            draw(); yield;

            if(u===t){
                log("Målet ("+labels[t]+") er nået!");
                break;
            }

            for(const {v,w} of adj[u]){
                const nd=d+w;

                if(nd<distArr[v]){
                    distArr[v]=nd;
                    prevArr[v]=u;
                    pqVisual.push([nd,v]);
                    nodeState[v]="queued";

                    log(`Opdaterer ${labels[v]} → ${nd} (via ${labels[u]})`);
                }

                draw(); yield;
            }

            nodeState[u]="visited";
        }

        // ─── FIND PATH ─────────────────

        let cur=t;
        while(prevArr[cur]!==-1){
            const p=prevArr[cur];
            pathEdges.add(`${p}-${cur}`);
            cur=p;
        }

        // ─── LOG PATH ─────────────────

        let path=[];
        cur=t;
        while(cur!==-1){
            path.push(labels[cur]);
            cur=prevArr[cur];
        }

        path.reverse();
        log("Korteste vej: "+path.join(" → "));

        draw();
    }

    // ─── BUTTONS ──────────────────────────────

    function reset(){
        gen=null;
        logEl.innerHTML="";
        queueEl.textContent="";
        nodeState=Array(houses.length).fill("unvisited");
        distArr=Array(houses.length).fill(Infinity);
        pathEdges.clear();

        document.getElementById("btn-step").disabled=true;
        document.getElementById("btn-go").disabled=false;

        draw();
    }

    document.getElementById("btn-go").onclick=()=>{
        reset();
        gen=dijkstra(SRC,DST);
        document.getElementById("btn-step").disabled=false;
        document.getElementById("btn-go").disabled=true;
        gen.next();
    };

    document.getElementById("btn-step").onclick=()=>{
        const r=gen.next();
        if(r.done) document.getElementById("btn-step").disabled=true;
    };

    document.getElementById("btn-reset").onclick=reset;

    reset();
</script>
</body>
</html>
